<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKグループ 営業会議ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #1F4E78;
    --accent: #2E86C1;
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --muted2: #9AA1AC;
    --border: #E5E9EF;
    --success: #16A085;
    --success-bg: #E3F5EF;
    --success-text: #0F6E56;
    --warning: #E67E22;
    --warning-bg: #FDF3E4;
    --warning-text: #92610C;
    --danger: #C0392B;
    --danger-bg: #FBEAEA;
    --danger-text: #96251C;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  /* ヘッダー */
  header {
    background: var(--primary); color: #fff;
    padding: 14px 24px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-wrap: wrap; gap: 6px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; opacity: 0.8; }
  @media (max-width: 480px) {
    header { padding: 10px 16px; }
    header h1 { font-size: 15px; }
  }

  /* コントロールバー */
  .controls {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .controls label { font-size: 13px; color: var(--muted); }
  .controls select {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; background: #fff; cursor: pointer;
    color: var(--text);
  }

  /* ローディングオーバーレイ */
  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.75); z-index: 200;
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  #loading-overlay.active { display: flex; }
  .spinner-lg {
    width: 48px; height: 48px;
    border: 5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  #loading-text { font-size: 14px; color: var(--muted); }

  /* メインレイアウト */
  main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  @media (min-width: 1800px) { main { max-width: 1800px; } }
  @media (max-width: 768px)  { main { padding: 14px 16px; } }

  /* タブ */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* タブコンテンツ */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* カード */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .card h2 { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 14px;
              padding-bottom: 8px; border-bottom: 2px solid var(--border); }

  /* KPIサマリーバー */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .kpi-card.kpi-danger { background: var(--danger-bg); border-color: transparent; }
  .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .kpi-value { font-size: 32px; font-weight: 600; color: var(--text); }
  .kpi-value .kpi-unit { font-size: 14px; font-weight: 400; color: var(--muted); margin-left: 2px; }
  .kpi-danger .kpi-label, .kpi-danger .kpi-value { color: var(--danger-text); }

  /* 部署サマリーカード */
  .dept-card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .dept-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; transition: border-color 0.15s;
  }
  .dept-card.state-danger { border-color: var(--danger); border-width: 1px; background: var(--danger-bg); }
  .dept-card.state-empty { opacity: 0.55; }
  .dept-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
  .dept-card-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .dept-card-metric { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dept-card-numbers { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .dept-card-actual { font-size: 26px; font-weight: 600; color: var(--text); }
  .dept-card-target { font-size: 13px; color: var(--muted); }
  .dept-card-empty-text { font-size: 13px; color: var(--muted); }
  .dept-card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* 前月比バッジ */
  .delta-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .delta-up   { background: var(--success-bg); color: var(--success-text); }
  .delta-down { background: var(--danger); color: #fff; }
  .delta-flat { background: #EEF0F3; color: #8A909B; }

  /* 次回までのアクション */
  .action-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .action-list-title { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .action-item { font-size: 12px; color: var(--text); line-height: 1.6; }
  .action-status-todo, .action-status-inprogress {
    display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
    border-radius: 8px; margin-right: 6px;
  }
  .action-status-todo       { background: var(--danger); color: #fff; }
  .action-status-inprogress { background: var(--warning-bg); color: var(--warning-text); }

  /* 達成率バッジ */
  .rate-badge {
    display: inline-block; padding: 4px 12px; border-radius: 12px;
    font-size: 14px; font-weight: 600; white-space: nowrap;
  }
  .rate-over { background: var(--success-bg); color: var(--success-text); }
  .rate-near { background: var(--warning-bg); color: var(--warning-text); }
  .rate-low  { background: var(--danger-bg); color: var(--danger-text); }
  .rate-na   { background: #EEF0F3; color: #8A909B; }

  /* 案件ステータスバッジ（新規案件タブ用） */
  .cat-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .cat-badge.cat-good   { background: var(--success-bg); color: var(--success-text); }
  .cat-badge.cat-bad    { background: var(--danger-bg);  color: var(--danger-text); }
  .cat-badge.cat-normal { background: #EEF0F3; color: #8A909B; }

  /* プログレスバー（細く・意味で色分け） */
  .progress-wrap { background: #EEF0F3; border-radius: 3px; height: 5px;
                   width: 100%; overflow: hidden; display: block; margin-top: 2px; }
  .progress-bar  { height: 100%; border-radius: 3px; transition: width 0.4s; }

  /* グリッド */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

  /* 人事カード（表形式：対象者/カテゴリ/内容/対応状況を項目見出しで固定） */
  .hr-list { display: flex; flex-direction: column; gap: 8px; }
  .hr-item {
    display: grid;
    grid-template-columns: 110px 160px 1fr 90px;
    gap: 0; align-items: stretch;
    border-radius: 8px;
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    background: #F8FAFC; overflow: hidden;
  }
  .hr-item.cat-good   { border-left-color: var(--success); }
  .hr-item.cat-bad    { border-left-color: var(--warning); }
  .hr-item.cat-safety { border-left-color: var(--danger); }
  .hr-item.cat-enter  { border-left-color: #8E64AD; }
  .hr-field { padding: 10px 12px; border-right: 1px solid var(--border); }
  .hr-field:last-child { border-right: none; }
  .hr-field-label { display: none; }
  @media (max-width: 640px) {
    .hr-field-label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  }
  .hr-field-value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .hr-field-value.hr-status-完了   { color: var(--success-text); font-weight: 600; }
  .hr-field-value.hr-status-対応中 { color: var(--warning-text); font-weight: 600; }
  .hr-field-value.hr-status-未対応 { color: var(--danger-text); font-weight: 600; }
  .hr-list-head {
    display: grid; grid-template-columns: 110px 160px 1fr 90px;
    padding: 0 0 6px; margin-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .hr-list-head span { font-size: 11px; color: var(--muted); padding: 0 12px; font-weight: 600; }
  @media (max-width: 640px) {
    .hr-item, .hr-list-head { grid-template-columns: 1fr; }
    .hr-field { border-right: none; border-bottom: 1px solid var(--border); }
    .hr-field:last-child { border-bottom: none; }
    .hr-list-head { display: none; }
  }

  /* グラフキャンバス */
  .chart-wrap { position: relative; height: 280px; }
  .chart-canvas-wrap { position: relative; height: 300px; padding-bottom: 8px; }
  @media (max-width: 768px) { .chart-canvas-wrap { height: 240px; } }
  @media (min-width: 1800px) { .chart-canvas-wrap { height: 360px; } }

  /* エラー表示 */
  .error-box {
    background: #FDEDEC; border: 1px solid #E74C3C; border-radius: 8px;
    padding: 16px; color: #922B21; font-size: 13px;
  }

  /* 品目タブ */
  #item-tabs { overflow-x: auto; padding-bottom: 4px; }
  #item-tabs > div { display: flex; flex-wrap: wrap; gap: 6px; min-width: max-content; }
  @media (min-width: 900px) {
    #item-tabs > div { flex-wrap: wrap; min-width: 0; }
  }
  .item-tab {
    padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer;
    font-size: 12px; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .item-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .item-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .item-tab.default-tab { font-weight: 600; }

  /* 空状態 */
  .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  /* AIレポート */
  .report-card { margin-bottom: 16px; }
  .report-text { white-space: pre-line; font-size: 13px; line-height: 1.8; color: var(--text); }
  .report-meta { font-size: 11px; color: var(--muted2); margin-top: 10px; text-align: right; }
  .report-card-empty { border-style: dashed; opacity: 0.7; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner-lg"></div>
  <div id="loading-text">読み込み中...</div>
</div>

<header>
  <h1>📊 SKグループ 営業会議ダッシュボード</h1>
  <span id="header-ym">-</span>
</header>

<div class="controls">
  <label>対象年月</label>
  <button onclick="shiftYmSelect(-1)" title="前月へ" style="
    padding:6px 10px; border-radius:6px; border:1px solid var(--border);
    background:#fff; cursor:pointer; font-size:13px; color:var(--muted);">◀ 前月</button>
  <select id="ym-select" onchange="loadAll()"><option value="">読み込み中...</option></select>
  <button onclick="shiftYmSelect(1)" title="翌月へ" style="
    padding:6px 10px; border-radius:6px; border:1px solid var(--border);
    background:#fff; cursor:pointer; font-size:13px; color:var(--muted);">翌月 ▶</button>
  <button onclick="loadAll()" title="最新のフラットログを再読み込み" style="
    padding:6px 12px; border-radius:6px; border:1px solid var(--border);
    background:#fff; cursor:pointer; font-size:13px; color:var(--muted);
    transition:all 0.2s;">🔄 再読み込み</button>
</div>

<main>
  <div class="tabs">
    <div class="tab active" onclick="showTab('tab-summary', this)">📋 全部署サマリー</div>
    <div class="tab" onclick="showTab('tab-report', this)">📝 AIレポート</div>
    <div class="tab" onclick="showTab('tab-hr', this)">👥 人事コメント</div>
    <div class="tab" onclick="showTab('tab-perf', this)">📈 部署別実績</div>
    <div class="tab" onclick="showTab('tab-shinki', this)">🏢 新規案件</div>
  </div>

  <!-- サマリータブ -->
  <div id="tab-summary" class="tab-content active">
    <div id="kpi-row" class="kpi-row"></div>
    <div id="summary-body"><div class="empty">データがありません</div></div>
  </div>

  <!-- 人事コメントタブ -->
  <div id="tab-hr" class="tab-content">
    <div class="card">
      <h2>今月の人事コメント（全部署）</h2>
      <div id="hr-body"><div class="empty">データがありません</div></div>
    </div>
  </div>

  <!-- 部署別実績タブ -->
  <div id="tab-perf" class="tab-content">
    <div class="controls" style="background:none;border:none;padding:0;margin-bottom:16px;gap:12px;">
      <label>部署</label>
      <select id="dept-select" onchange="onDeptChange()">
        <option value="">全部署（当月カード表示）</option>
      </select>
      <label style="margin-left:8px;">品目</label>
      <select id="item-select" onchange="syncItemTabsActive(); renderChart();" style="display:none;"></select>
    </div>

    <!-- 品目タブ（部署のデフォルト指標で品目ごとにワンクリック切替） -->
    <div id="item-tabs" style="display:none;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;">
      <div style="display:flex;flex-wrap:nowrap;gap:6px;min-width:max-content;"></div>
    </div>

    <!-- 月次推移グラフ -->
    <div id="chart-card" class="card" style="display:none;margin-bottom:16px;">
      <h2 id="chart-title">月次推移</h2>
      <div class="chart-canvas-wrap">
        <canvas id="trend-chart"></canvas>
      </div>
      <div id="chart-status" style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;"></div>
    </div>

    <!-- 当月品目別カード -->
    <div id="perf-body"><div class="empty">データがありません</div></div>
  </div>

  <!-- 新規案件タブ（感動デザイン課） -->
  <div id="tab-shinki" class="tab-content">
    <div class="controls" style="background:none;border:none;padding:0;margin-bottom:16px;gap:12px;">
      <label>対象年月</label>
      <select id="shinki-ym-select" onchange="renderShinkiAnken()">
        <option value="">すべて</option>
      </select>
      <label style="margin-left:8px;">ランク</label>
      <select id="shinki-rank-select" onchange="renderShinkiAnken()">
        <option value="">すべて</option>
        <option value="S">S</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
      <label style="margin-left:8px;">結果</label>
      <select id="shinki-result-select" onchange="renderShinkiAnken()">
        <option value="">すべて</option>
      </select>
    </div>
    <div id="shinki-body"><div class="empty">データがありません</div></div>
  </div>

  <!-- AIレポートタブ -->
  <div id="tab-report" class="tab-content">
    <div id="report-body"><div class="empty">この月のAIレポートはまだ生成されていません</div></div>
  </div>
</main>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbybAvXkNCx9avzHmPW9HfThs7Z6o5tHHoC_QkfFcYLXbodTRUhuwbK8tpjno1SYo56_9g/exec";

// GAS側 getAvailableMonths_() と同じ内容（通信失敗時のフォールバック用）
const FALLBACK_MONTHS = ["2026-04","2026-05","2026-06","2026-07","2026-08","2026-09",
                         "2026-10","2026-11","2026-12","2027-01","2027-02","2027-03"];

const ALL_DEPTS = [
  "地域インフラ共創部1課","地域インフラ共創部2課",
  "感動デザイン課","総合クリエイト課","トータルメンテナンス課",
  "Re\"バース仙台港","Re\"バース仙台岩切","Re\"バース仙台扇町"
];

// 未来の空月ではなく「実績がある中で一番新しい月」をデフォルトにする
function pickDefaultYm(months) {
  if (!months.length) return null;
  const now = new Date();
  const todayYm = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
  const pastOrCurrent = months.filter(function(m) { return m <= todayYm; }).sort().reverse();
  return pastOrCurrent.length ? pastOrCurrent[0] : [...months].sort()[0];
}

// 年月セレクトを1つ前/次の月へ移動する（前月・翌月ボタン用）
function shiftYmSelect(delta) {
  const sel = document.getElementById('ym-select');
  const options = Array.from(sel.options).map(function(o) { return o.value; }).sort();
  const idx = options.indexOf(sel.value);
  if (idx === -1) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= options.length) return;
  sel.value = options[newIdx];
  loadAll();
}

// 年月文字列をnヶ月シフトする（前月比の算出に使用）
function shiftYmString(ym, deltaMonths) {
  const parts = ym.split("-");
  const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1 + deltaMonths, 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

// 部署ごとの主要指標定義（サマリーカードで表示する指標）
const DEPT_MAIN = {
  "地域インフラ共創部1課":  { metric:"粗利益", unit:"千円" },
  "地域インフラ共創部2課":  { metric:"数量",   unit:"t"    },
  "感動デザイン課":         { metric:"数量",   unit:"t"    },
  "総合クリエイト課":       { metric:null,     unit:null   },
  "トータルメンテナンス課": { metric:null,     unit:null   },
  "Re\"バース仙台港":       { metric:"数量",   unit:"t"    },
  "Re\"バース仙台岩切":     { metric:"数量",   unit:"t"    },
  "Re\"バース仙台扇町":     { metric:"数量",   unit:"t"    },
};

// 部署によっては「合計」品目と「内訳品目」が両方記録されており、
// 単純合算すると二重カウントになるため、集計対象の品目を制限する
// （未定義の部署は従来通り全品目を合算）
const DEPT_SUMMARY_ITEMS = {
  "地域インフラ共創部2課": ["RPS_合計"],
  "Re\"バース仙台扇町": ["古紙合計"],
};

// 人事コメントのカテゴリ分類（サマリーカードのバッジ判定にも使用）
const HR_CAT_CLASS = {
  '頑張り・好事例': 'cat-good',
  '安全衛生（事故・労災）': 'cat-safety',
  '問題行動・クレーム対応': 'cat-bad',
  '安全衛生': 'cat-safety',
  '問題行動・クレーム': 'cat-bad',
  '入退社・異動': 'cat-enter',
};
const HR_NEGATIVE_CLASSES = ['cat-bad', 'cat-safety'];

// 部署別の目標・実績サマリーを計算する（当月・前月の両方で同じロジックを使うため関数化）
function computeDeptSummary(perfRecords, ym, depts) {
  return depts.map(function(dept) {
    const allRecs = perfRecords.filter(function(r){ return r.dept === dept; });
    const summaryItems = DEPT_SUMMARY_ITEMS[dept];
    const recs = summaryItems
      ? allRecs.filter(function(r){ return summaryItems.includes(r.item); })
      : allRecs;
    const mainDef = DEPT_MAIN[dept] || { metric:"数量", unit:null };
    let totalTarget=0, totalActual=0, itemCount=0;
    recs.forEach(function(r){
      const metricMatch = !mainDef.metric || r.metric === mainDef.metric;
      const unitMatch   = !mainDef.unit   || r.unit   === mainDef.unit;
      if (metricMatch && unitMatch) {
        if(typeof r.target==="number" && r.target > 0) totalTarget+=r.target;
        if(typeof r.actual==="number" && r.actual > 0) totalActual+=r.actual;
        itemCount++;
      }
    });
    return {
      dept:dept, ym:ym,
      mainMetric: mainDef.metric,
      mainUnit:   mainDef.unit,
      totalTarget:totalTarget, totalActual:totalActual,
      achieveRate:totalTarget>0?Math.round(totalActual/totalTarget*100):null,
      itemCount:itemCount,
      prevAchieveRate: null
    };
  });
}

// ============================================================
// JSONP fetch（CORSを回避）
// ============================================================
let _jsonpCounter = 0;
function fetchJSONP(url) {
  return new Promise(function(resolve, reject) {
    const cbName = 'skg_cb_' + (++_jsonpCounter);
    const script = document.createElement('script');
    const timeout = setTimeout(function() {
      cleanup();
      reject(new Error('タイムアウト（60秒）'));
    }, 60000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
    }
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };
    script.onerror = function() {
      cleanup();
      reject(new Error('スクリプト読み込みエラー'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}
function showTab(id, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

async function init() {

  try {

    } catch (firstErr) {

      res = await fetchJSONP(GAS_URL + '?type=months');
    }
    const data = res;
    const months = (data.months || []).sort().reverse();
    const sel = document.getElementById('ym-select');
    sel.innerHTML = '';
    if (months.length === 0) {
      [...FALLBACK_MONTHS].sort().reverse().forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
    } else {
      months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
    }
    const defaultYm1 = pickDefaultYm(months.length ? months : FALLBACK_MONTHS);
    if (defaultYm1) sel.value = defaultYm1;
    // 最初の年月を自動ロード
    setStatus('', false);
    loadAll();
  } catch(e) {
    setStatus('', false);
    const sel = document.getElementById('ym-select');
    sel.innerHTML = '';
    [...FALLBACK_MONTHS].sort().reverse().forEach(m => {
      const opt = document.createElement('option');

// ============================================================
// メイン：全データを取得して表示
// ============================================================
async function loadAll(nocache) {
  const ym = document.getElementById('ym-select').value;
  if (!ym) return;
  document.getElementById('header-ym').textContent = ym;
  cachedPerf = [];
  cachedHr = [];
  cachedSummary = [];

  const DEPTS = ALL_DEPTS;
  const prevYm = shiftYmString(ym, -1);

  setStatus(nocache ? '最新データを取得中...' : '読み込み中...', true);

  // 依存関係のない通信をまとめて同時に開始（読み込み高速化）
  const flatUrl     = GAS_URL + '?type=all_flat&ym=' + encodeURIComponent(ym);
  const prevFlatUrl = GAS_URL + '?type=all_flat&ym=' + encodeURIComponent(prevYm);
  const reportUrl   = GAS_URL + '?type=reports&ym=' + encodeURIComponent(ym);
  const shinkiUrl   = GAS_URL + '?type=shinki_anken';
  const actionsUrl  = GAS_URL + '?type=actions';
  const flatPromise     = fetchJSONP(flatUrl);
  const prevFlatPromise = fetchJSONP(prevFlatUrl).catch(function() { return null; });
  const reportPromise   = fetchJSONP(reportUrl).catch(function() { return null; });
  const shinkiPromise   = fetchJSONP(shinkiUrl).catch(function() { return null; });
  const actionsPromise  = fetchJSONP(actionsUrl).catch(function() { return null; });

  let data = null;
  try {
    data = await flatPromise;
    if (data && data.perf) data.perf.forEach(function(r){ cachedPerf.push(r); });
    if (data && data.hr)   data.hr.forEach(function(r){   cachedHr.push(r);   });
  } catch(err) {
    setStatus('', false);
    document.getElementById('summary-body').innerHTML =
      '<div class="error-box">データ取得に失敗しました。<br>' + err.message + '</div>';
  }

  // サマリー計算（当月）
  cachedSummary = computeDeptSummary(cachedPerf, ym, DEPTS);

  // 前月比較（前月比バッジ用。取得できなくても本体表示は継続する）
  const prevFlatData = await prevFlatPromise;
  const prevPerf = (prevFlatData && prevFlatData.perf) ? prevFlatData.perf : [];
  const prevSummary = computeDeptSummary(prevPerf, prevYm, DEPTS);
  cachedSummary.forEach(function(row) {
    const prevRow = prevSummary.find(function(p){ return p.dept === row.dept; });
    row.prevAchieveRate = (prevRow && prevRow.achieveRate !== null) ? prevRow.achieveRate : null;
  });

  const actionsData = await actionsPromise;
  cachedActions = (actionsData && actionsData.list) ? actionsData.list : [];

  if (data) {
    renderSummary(DEPTS);
    renderHr();
    renderPerfDetail();
  }

  const reportData = await reportPromise;
  cachedReports = (reportData && reportData.reports) ? reportData.reports : [];
  renderReports();

  const shinkiData = await shinkiPromise;
  cachedShinki = (shinkiData && shinkiData.list) ? shinkiData.list : [];
  populateShinkiYmSelect();
  populateShinkiResultSelect();
  renderShinkiAnken();

  const deptSel = document.getElementById('dept-select');
  const prevDept = deptSel.value;
  deptSel.innerHTML = '<option value="">全部署</option>';
  DEPTS.forEach(function(d) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    deptSel.appendChild(opt);
  });
  if (prevDept && DEPTS.includes(prevDept)) {
    deptSel.value = prevDept;
  }

  document.getElementById('header-ym').textContent =
    ym + '（実績 ' + cachedPerf.length + '件・人事 ' + cachedHr.length + '件）';
  setStatus('', false);
}

// ============================================================
// サマリーテーブル描画
// ============================================================
function renderSummary(DEPTS_ARG) {
  const kpiRow = document.getElementById('kpi-row');
  const body = document.getElementById('summary-body');

  if (!cachedSummary.length) {
    kpiRow.innerHTML = '';
    body.innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  const withRate = cachedSummary.filter(function(r){ return r.achieveRate !== null; });
  const achievedCount = withRate.filter(function(r){ return r.achieveRate >= 100; }).length;
  const dangerCount   = withRate.filter(function(r){ return r.achieveRate < 80; }).length;
  const avgRate = withRate.length
    ? Math.round(withRate.reduce(function(s,r){ return s + r.achieveRate; }, 0) / withRate.length)
    : null;
  const hrCount = (typeof cachedHr !== 'undefined') ? cachedHr.filter(function(r){ return r.content; }).length : 0;

  kpiRow.innerHTML =
    '<div class="kpi-card">'
      + '<div class="kpi-label">達成部署数</div>'
      + '<div class="kpi-value">' + achievedCount + '<span class="kpi-unit"> / ' + withRate.length + '</span></div>'
    + '</div>'
    + '<div class="kpi-card">'
      + '<div class="kpi-label">平均達成率</div>'
      + '<div class="kpi-value">' + (avgRate !== null ? avgRate : '-') + '<span class="kpi-unit">%</span></div>'
    + '</div>'
    + '<div class="kpi-card' + (dangerCount > 0 ? ' kpi-danger' : '') + '">'
      + '<div class="kpi-label">要注意（80%未満）</div>'
      + '<div class="kpi-value">' + dangerCount + '<span class="kpi-unit"> 部署</span></div>'
    + '</div>'
    + '<div class="kpi-card">'
      + '<div class="kpi-label">人事コメント</div>'
      + '<div class="kpi-value">' + hrCount + '<span class="kpi-unit"> 件</span></div>'
    + '</div>';

  // 前月比バッジ
  function buildDeltaBadge(row) {
    if (row.achieveRate === null || row.prevAchieveRate === null) return '';
    const delta = Math.round(row.achieveRate - row.prevAchieveRate);
    if (delta === 0) return '<span class="delta-badge delta-flat">→ 前月と同水準</span>';
    const sign = delta > 0 ? '+' : '';
    const cls  = delta > 0 ? 'delta-up' : 'delta-down';
    const icon = delta > 0 ? '▲' : '▼';
    return '<span class="delta-badge ' + cls + '">' + icon + ' 前月比' + sign + delta + 'pt</span>';
  }

  // 人事コメントありバッジ（クレーム等があれば警告色、無ければ通常色）
  function buildHrBadge(dept) {
    const items = cachedHr.filter(function(h){ return h.dept === dept && h.content; });
    if (!items.length) return '';
    const hasNegative = items.some(function(h){ return HR_NEGATIVE_CLASSES.includes(HR_CAT_CLASS[h.category] || ''); });
    const cls = hasNegative ? 'cat-bad' : 'cat-good';
    const label = hasNegative ? '⚠ 人事コメントあり' : '💬 人事コメントあり';
    return '<span class="cat-badge ' + cls + '">' + label + '</span>';
  }

  // 次回までのアクション（未完了分のみ表示）
  function buildActionsHtml(dept) {
    const items = cachedActions.filter(function(a){ return a.dept === dept && a.status !== '完了'; });
    if (!items.length) return '';
    let h = '<div class="action-list"><div class="action-list-title">📌 次回までのアクション</div>';
    items.forEach(function(a) {
      const statusCls = a.status === '対応中' ? 'action-status-inprogress' : 'action-status-todo';
      h += '<div class="action-item"><span class="' + statusCls + '">' + esc(a.status || '未着手') + '</span>' + esc(a.text) + '</div>';
    });
    h += '</div>';
    return h;
  }

  // 1部署分のカードHTMLを生成（要注意セクション・通常グループの両方で共通利用）
  function buildDeptCard(row) {
    const rate = row.achieveRate;
    const rateStr = rate !== null ? rate + '%' : '-';
    let cls = 'rate-na', barColor = 'var(--muted2)', stateCls = '';
    if (rate !== null) {
      if (rate >= 100) { cls = 'rate-over'; barColor = 'var(--success)'; }
      else if (rate >= 80) { cls = 'rate-near'; barColor = 'var(--warning)'; }
      else { cls = 'rate-low'; barColor = 'var(--danger)'; stateCls = 'state-danger'; }
    } else if (!row.mainMetric) {
      stateCls = 'state-empty';
    }
    const barWidth = rate !== null ? Math.min(rate, 100) : 0;
    const metricLabel = row.mainMetric ? row.mainMetric + (row.mainUnit ? '（' + row.mainUnit + '）' : '') : '指標なし';
    const deltaHtml = buildDeltaBadge(row);
    const hrBadgeHtml = buildHrBadge(row.dept);
    const actionsHtml = buildActionsHtml(row.dept);

    let cardHtml = '<div class="dept-card ' + stateCls + '">'
      + '<div class="dept-card-head">'
        + '<div>'
          + '<div class="dept-card-name">' + esc(row.dept) + '</div>'
          + '<div class="dept-card-metric">' + esc(metricLabel) + '</div>'
        + '</div>'
        + (rate !== null ? '<span class="rate-badge ' + cls + '">' + rateStr + '</span>' : '')
      + '</div>';

    if (row.mainMetric) {
      cardHtml += '<div class="dept-card-numbers">'
          + '<span class="dept-card-actual">' + fmtNum(row.totalActual) + '</span>'
          + '<span class="dept-card-target">/ 目標 ' + fmtNum(row.totalTarget) + '</span>'
        + '</div>'
        + '<div class="progress-wrap"><div class="progress-bar" style="width:' + barWidth + '%;background:' + barColor + '"></div></div>';
    } else {
      cardHtml += '<div class="dept-card-empty-text">数値実績の登録なし</div>';
    }

    if (deltaHtml || hrBadgeHtml) {
      cardHtml += '<div class="dept-card-badges">' + deltaHtml + hrBadgeHtml + '</div>';
    }
    cardHtml += actionsHtml;
    cardHtml += '</div>';
    return cardHtml;
  }

  let html = '';

  // 部署カードの表示順（達成率順ではなく固定の3グループ）
  const DEPT_GROUPS = [
    ["地域インフラ共創部1課", "地域インフラ共創部2課", "感動デザイン課"],
    ["Re\"バース仙台港", "Re\"バース仙台扇町", "Re\"バース仙台岩切"],
    ["総合クリエイト課", "トータルメンテナンス課"],
  ];
  // 実績データが無い場合はカードごと非表示にする部署
  const HIDE_IF_EMPTY = ["総合クリエイト課", "トータルメンテナンス課"];

  DEPT_GROUPS.forEach(function(group) {
    const rows = group
      .map(function(dept) { return cachedSummary.find(function(r){ return r.dept === dept; }); })
      .filter(function(row) {
        if (!row) return false;
        if (HIDE_IF_EMPTY.includes(row.dept) && !row.mainMetric) return false;
        return true;
      });
    if (!rows.length) return;

    html += '<div class="dept-card-grid">';
    rows.forEach(function(row) { html += buildDeptCard(row); });
    html += '</div>';
  });
  body.innerHTML = html || '<div class="empty">データがありません</div>';
}

  }

  // トータルメンテナンス課：全年度比較用データも取得（初回のみ）
  if (dept === "トータルメンテナンス課" && !cachedTotalMenteYears) {
    try {
      const url2 = GAS_URL + '?type=totalmente_years';
      const data2 = await fetchJSONP(url2);
      cachedTotalMenteYears = data2.categories || [];
    } catch(err) {
      cachedTotalMenteYears = [];
    }
  }

  // デフォルト設定を先頭に追加してから品目プルダウンを構築
  const def = DEPT_DEFAULT_CHART[dept];
  const itemKeys = [...new Set(cachedTrend[dept].map(function(r){
    return r.item + '||' + r.metric;
  }))];

  let optionsHtml = '';
  // デフォルト（合計）選択肢を先頭に追加
  if (def && def.filterFn) {
    optionsHtml += '<option value="__default__">' + def.label + '</option>';
  }
  optionsHtml += itemKeys.map(function(k) {
    const parts = k.split('||');
    return '<option value="' + esc(k) + '">' + parts[0] + '（' + parts[1] + '）</option>';
  }).join('');

  // トータルメンテナンス課：全年度比較の選択肢を追加
  if (dept === "トータルメンテナンス課" && cachedTotalMenteYears && cachedTotalMenteYears.length) {
    optionsHtml += cachedTotalMenteYears.map(function(c) {
      return '<option value="ALLYEARS::' + esc(c.category) + '">' + esc(c.category) + '（全年度比較）</option>';
    }).join('');
  }

  itemSel.innerHTML = optionsHtml;

  // デフォルト品目を自動選択
  if (def) {
    if (def.filterFn) {
      itemSel.value = '__default__';
    } else if (def.key) {
      itemSel.value = def.key;
      if (!itemSel.value) itemSel.selectedIndex = 0; // なければ先頭
    }
  }

  // 品目タブを生成（部署のデフォルト指標で品目ごとにワンクリック切替）
  renderItemTabs(dept);

  document.getElementById('chart-status').textContent = '';
  renderChart();
}

// ============================================================
// 品目タブ生成（デフォルト指標のみを対象に、品目ごとにタブ化）
// ============================================================
function renderItemTabs(dept) {
  const tabsWrap = document.getElementById('item-tabs');
  const tabsInner = tabsWrap.querySelector('div');
  const defaultMetric = DEPT_DEFAULT_METRIC[dept];

  if (!defaultMetric || !cachedTrend[dept] || !cachedTrend[dept].length) {
    tabsWrap.style.display = 'none';
    return;
  }

  // デフォルト指標に該当する品目一覧（重複なし）
  const items = [...new Set(
    cachedTrend[dept]
      .filter(function(r){ return r.metric === defaultMetric; })
      .map(function(r){ return r.item; })
  )];

  if (!items.length) {
    tabsWrap.style.display = 'none';
    return;
  }

  const def = DEPT_DEFAULT_CHART[dept];
  let html = '';

  // 合計タブ（filterFnがある部署のみ）
  if (def && def.filterFn) {
    html += '<div class="item-tab default-tab" data-key="__default__" onclick="selectItemTab(\'__default__\')">'
      + '📊 ' + esc(def.label) + '</div>';
  }

  items.forEach(function(item) {
    const key = item + '||' + defaultMetric;
    html += '<div class="item-tab" data-key="' + esc(key) + '" onclick="selectItemTab(\'' + esc(key) + '\')">'
      + esc(item) + '</div>';
  });

  tabsInner.innerHTML = html;
  tabsWrap.style.display = 'block';
  syncItemTabsActive();
}

// タブクリック → プルダウンと連動してグラフ更新
function selectItemTab(key) {
  document.getElementById('item-select').value = key;
  syncItemTabsActive();
  renderChart();
}

// プルダウン変更時にタブのハイライトも同期
function syncItemTabsActive() {
  const currentKey = document.getElementById('item-select').value;
  document.querySelectorAll('#item-tabs .item-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.key === currentKey);
  });
}

// ============================================================
// グラフ描画（Chart.js・目標=点線折れ線・実績=実線折れ線）
// ============================================================
function renderChart() {
  const dept    = document.getElementById('dept-select').value;
  const itemKey = document.getElementById('item-select').value;
  if (!dept || !itemKey) return;

  // トータルメンテナンス課：全年度比較モード
  if (itemKey.indexOf('ALLYEARS::') === 0) {
    const category = itemKey.substring('ALLYEARS::'.length);
    renderAllYearsChart(dept, category);
    return;
  }

  if (!cachedTrend[dept]) return;

  const FY = 2026;
  const MONTHS = ["04","05","06","07","08","09","10","11","12","01","02","03"];
  const YEARS  = [FY,FY,FY,FY,FY,FY,FY,FY,FY,FY+1,FY+1,FY+1];
  const labels  = MONTHS.map(function(m,i){ return YEARS[i] + '/' + m; });

  let records, chartLabel, unit;
  const def = DEPT_DEFAULT_CHART[dept];

  if (itemKey === '__default__' && def && def.filterFn) {
    // 合計モード：filterFnに一致する全品目を月ごとに合算
    const filtered = cachedTrend[dept].filter(def.filterFn);
    unit = filtered.length ? (filtered[0].unit || '') : '';
    chartLabel = def.label;
    // 月ごとに集計
    const targetByYm = {}, actualByYm = {};
    filtered.forEach(function(r) {
      if (!targetByYm[r.ym]) targetByYm[r.ym] = 0;
      if (!actualByYm[r.ym]) actualByYm[r.ym] = 0;
      if (typeof r.target === 'number') targetByYm[r.ym] += r.target;
      if (typeof r.actual === 'number') actualByYm[r.ym] += r.actual;
    });
    var targets = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      return targetByYm[ym] || null;
    });
    var actuals = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      return actualByYm[ym] || null;
    });
    drawChart(labels, targets, actuals, dept, chartLabel, unit);
  } else {
    // 単一品目モード
    const [selItem, selMetric] = itemKey.split('||');
    records = cachedTrend[dept].filter(function(r){
      return r.item === selItem && r.metric === selMetric;
    });
    if (!records.length) return;
    unit = records[0].unit || '';
    chartLabel = selItem + '（' + selMetric + '・' + unit + '）';
    var targets = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      const r = records.find(function(x){ return x.ym===ym; });
      return (r && r.target != null && r.target !== 0) ? r.target : null;
    });
    var actuals = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      const r = records.find(function(x){ return x.ym===ym; });
      return (r && r.actual != null && r.actual !== 0) ? r.actual : null;
    });
    drawChart(labels, targets, actuals, dept, chartLabel, unit);
  }
}

function drawChart(labels, targets, actuals, dept, chartLabel, unit) {
  document.getElementById('chart-title').textContent = dept + ' ｜ ' + chartLabel + ' 月次推移';
  document.getElementById('chart-status').textContent = '';
  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '目標',
          data: targets,
          borderColor: 'rgba(46,134,193,0.8)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [6, 4],
          pointBackgroundColor: 'rgba(46,134,193,0.8)',
          pointRadius: 3,
          tension: 0.3,
          spanGaps: true
        },
        {
          label: '実績',
          data: actuals,
          borderColor: '#E67E22',
          backgroundColor: 'rgba(230,126,34,0.08)',
          borderWidth: 2.5,
          borderDash: [],
          pointBackgroundColor: '#E67E22',
          pointRadius: 4,
          tension: 0.3,
          fill: true,
          spanGaps: true
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 4, right: 8 } },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: function(ctx){ return ctx.dataset.label + ': ' + fmtNum(ctx.raw) + unit; }
          }
        }
      },
      scales: {
        x: {
          ticks: { maxRotation: 0, autoSkipPadding: 8 }
        },
        y: {
          beginAtZero: false,
          ticks: { callback: function(v){ return fmtNum(v); } }
        }
      }
    }
  });
}

// ============================================================
// トータルメンテナンス課：事故件数の全年度比較チャート
// 年度ごとに1本の折れ線として、全年度を同時に表示する
// （凡例クリックで特定の年度だけ表示/非表示を切り替え可能＝過去年度への「切替」も兼ねる）
// ============================================================
const ALLYEARS_COLORS = [
  '#E67E22', '#2E86C1', '#16A085', '#C0392B',
  '#8E44AD', '#7F8C8D', '#D4AC0D', '#2C3E50'
];

function renderAllYearsChart(dept, category) {
  document.getElementById('chart-title').textContent = dept + ' ｜ ' + category + '（全年度比較） 月次推移';
  document.getElementById('chart-status').textContent = '';

  const MONTHS = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
  const found = (cachedTotalMenteYears || []).find(function(c){ return c.category === category; });
  const years = found ? found.years : [];

  const datasets = years.map(function(y, i) {
    const color = ALLYEARS_COLORS[i % ALLYEARS_COLORS.length];
    return {
      label: y.year,
      data: y.monthly,
      borderColor: color,
      backgroundColor: 'transparent',
      borderWidth: y.year.indexOf('令和8') === 0 ? 3 : 1.5,
      pointRadius: 3,
      tension: 0.3,
      spanGaps: true
    };
  });

  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels: MONTHS, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 4, right: 8 } },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: function(ctx){ return ctx.dataset.label + ': ' + fmtNum(ctx.raw) + '件'; }
          }
        }
      },
      scales: {
        x: { ticks: { maxRotation: 0, autoSkipPadding: 8 } },
        y: {
          beginAtZero: true,
          ticks: { callback: function(v){ return fmtNum(v); } }
        }
      }
    }
  });
}

// ============================================================
// 部署別実績描画（デフォルト指標のみ表示・折りたたみ対応）
// ============================================================
function renderPerfDetail() {
  const selectedDept = document.getElementById('dept-select').value;
  const body = document.getElementById('perf-body');
  const data = selectedDept
    ? cachedPerf.filter(function(r){ return r.dept === selectedDept; })
    : cachedPerf;

  if (!data.length) {
    body.innerHTML = '<div class="empty">実績データがありません</div>';
    return;
  }

  // 品目×指標でグループ化
  const groups = {};
  data.forEach(function(r) {
    const key = r.dept + '||' + r.item + '||' + r.metric;
    if (!groups[key]) groups[key] = { dept: r.dept, item: r.item, metric: r.metric, unit: r.unit, rows: [] };
    groups[key].rows.push(r);
  });

  let html = '';
  let prevDept = '';
  const deptGroups = {};

  // 部署ごとにグループをまとめる
  Object.values(groups).forEach(function(g) {
    if (!deptGroups[g.dept]) deptGroups[g.dept] = [];
    deptGroups[g.dept].push(g);
  });

  Object.keys(deptGroups).forEach(function(dept) {
    const gs = deptGroups[dept];
    const defaultMetric = DEPT_DEFAULT_METRIC[dept];

    // デフォルト表示グループと詳細グループに分離
    const defaultGs = defaultMetric ? gs.filter(function(g){ return g.metric === defaultMetric; }) : gs;
    const detailGs  = defaultMetric ? gs.filter(function(g){ return g.metric !== defaultMetric; }) : [];

    html += '<div class="card"><h2>' + dept + '</h2>';

    // デフォルト表示（主要指標カード）
    html += '<div class="grid-2">';
    defaultGs.forEach(function(g) { html += makeCard(g); });
    html += '</div>';

    // 詳細（折りたたみ）
    if (detailGs.length > 0) {
      const uid = dept.replace(/[^a-zA-Z0-9]/g, '_');
      html += '<div style="margin-top:12px">'
        + '<button onclick="toggleDetail(\'' + uid + '\')" id="btn_' + uid + '" style="'
        + 'font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;">'
        + '▶ その他の指標を表示</button>'
        + '<div id="detail_' + uid + '" style="display:none;margin-top:10px;">'
        + '<div class="grid-2">';
      detailGs.forEach(function(g) { html += makeCard(g); });
      html += '</div></div></div>';
    }

    html += '</div>';
  });

  body.innerHTML = html;
}

function makeCard(g) {
  const target = g.rows[0].target;
  const actual = g.rows[0].actual;
  const rate = (target && actual) ? Math.round(actual / target * 100) : null;
  let badgeCls = 'rate-na';
  if (rate !== null) {
    if (rate >= 100) badgeCls = 'rate-over';
    else if (rate >= 80) badgeCls = 'rate-near';
    else badgeCls = 'rate-low';
  }
  return '<div style="padding:10px;border:1px solid var(--border);border-radius:8px;background:#F8FAFC;margin-bottom:8px">'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:4px">' + g.item + '（' + g.metric + '）</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center">'
    + '<div>'
    + '<span style="font-size:13px;color:var(--muted)">目標：</span><strong>' + fmtNum(target) + g.unit + '</strong>'
    + '<span style="margin:0 6px;color:var(--border)">|</span>'
    + '<span style="font-size:13px;color:var(--muted)">実績：</span><strong>' + fmtNum(actual) + g.unit + '</strong>'
    + '</div>'
    + '<span class="rate-badge ' + badgeCls + '">' + (rate !== null ? rate + '%' : '-') + '</span>'
    + '</div></div>';
}

function toggleDetail(uid) {
  const detail = document.getElementById('detail_' + uid);
  const btn    = document.getElementById('btn_' + uid);
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '▶ その他の指標を表示' : '▼ その他の指標を非表示';
}

// ============================================================
// ユーティリティ
// ============================================================
function setStatus(msg, loading) {
  const overlay = document.getElementById('loading-overlay');
  const text = document.getElementById('loading-text');
  if (loading) {
    text.textContent = msg;
    overlay.classList.add('active');
  } else {
    overlay.classList.remove('active');
  }
}

function fmtNum(n) {
  if (n === null || n === undefined || n === '') return '-';
  return Math.round(Number(n)).toLocaleString('ja-JP');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 初期化
init();
</script>
