<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKグループ 営業会議ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #1F4E78;
    --accent: #2E86C1;
    --bg: #F4F6F8;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #E2E8F0;
    --success: #16A085;
    --warning: #E67E22;
    --danger: #C0392B;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  /* ヘッダー */
  header {
    background: var(--primary); color: #fff;
    padding: 14px 24px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; opacity: 0.8; }

  /* コントロールバー */
  .controls {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .controls label { font-size: 13px; color: var(--muted); }
  .controls select {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; background: #fff; cursor: pointer;
    color: var(--text);
  }

  /* ローディングオーバーレイ */
  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.75); z-index: 200;
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  #loading-overlay.active { display: flex; }
  .spinner-lg {
    width: 48px; height: 48px;
    border: 5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading-text { font-size: 14px; color: var(--muted); }

  /* メインレイアウト */
  main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

  /* タブ */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* タブコンテンツ */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* カード */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .card h2 { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 14px;
              padding-bottom: 8px; border-bottom: 2px solid var(--border); }

  /* サマリーテーブル */
  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table th {
    text-align: left; padding: 10px 12px; font-size: 12px;
    color: var(--muted); border-bottom: 2px solid var(--border);
    background: #F8FAFC;
  }
  .summary-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); }
  .summary-table tr:hover td { background: #F8FAFC; }
  .summary-table .dept-name { font-weight: 600; }

  /* 達成率バッジ */
  .rate-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }
  .rate-over { background: #D5F5E3; color: #1E8449; }
  .rate-near { background: #FEF9E7; color: #B7770D; }
  .rate-low  { background: #FDEDEC; color: #922B21; }
  .rate-na   { background: #EAECEE; color: #717D7E; }

  /* プログレスバー */
  .progress-wrap { background: var(--border); border-radius: 4px; height: 8px;
                   width: 120px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .progress-bar  { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* グリッド */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

  /* 人事カード */
  .hr-list { display: flex; flex-direction: column; gap: 10px; }
  .hr-item {
    padding: 12px 14px; border-radius: 8px; border-left: 4px solid var(--accent);
    background: #F8FAFC;
  }
  .hr-item.cat-good   { border-left-color: var(--success); }
  .hr-item.cat-bad    { border-left-color: var(--warning); }
  .hr-item.cat-safety { border-left-color: var(--danger); }
  .hr-item.cat-enter  { border-left-color: #8E44AD; }
  .hr-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .hr-meta .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: #E8EDF2; color: var(--muted);
  }
  .hr-content { font-size: 13px; line-height: 1.6; color: var(--text); }
  .hr-target { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* グラフキャンバス */
  .chart-wrap { position: relative; height: 280px; }

  /* エラー表示 */
  .error-box {
    background: #FDEDEC; border: 1px solid #E74C3C; border-radius: 8px;
    padding: 16px; color: #922B21; font-size: 13px;
  }

  /* 空状態 */
  .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner-lg"></div>
  <div id="loading-text">読み込み中...</div>
</div>

<header>
  <h1>📊 SKグループ 営業会議ダッシュボード</h1>
  <span id="header-ym">-</span>
</header>

<div class="controls">
  <label>対象年月</label>
  <select id="ym-select" onchange="loadAll()"><option value="">読み込み中...</option></select>
  <button onclick="loadAll()" title="最新のフラットログを再読み込み" style="
    padding:6px 12px; border-radius:6px; border:1px solid var(--border);
    background:#fff; cursor:pointer; font-size:13px; color:var(--muted);
    transition:all 0.2s;">🔄 再読み込み</button>
</div>

<main>
  <div class="tabs">
    <div class="tab active" onclick="showTab('tab-summary', this)">📋 全部署サマリー</div>
    <div class="tab" onclick="showTab('tab-hr', this)">👥 人事コメント</div>
    <div class="tab" onclick="showTab('tab-perf', this)">📈 部署別実績</div>
  </div>

  <!-- サマリータブ -->
  <div id="tab-summary" class="tab-content active">
    <div class="card">
      <h2>全部署 達成率サマリー</h2>
      <div id="summary-body"><div class="empty">データがありません</div></div>
    </div>
  </div>

  <!-- 人事コメントタブ -->
  <div id="tab-hr" class="tab-content">
    <div class="card">
      <h2>今月の人事コメント（全部署）</h2>
      <div id="hr-body"><div class="empty">データがありません</div></div>
    </div>
  </div>

  <!-- 部署別実績タブ -->
  <div id="tab-perf" class="tab-content">
    <div class="controls" style="background:none;border:none;padding:0;margin-bottom:16px;gap:12px;">
      <label>部署</label>
      <select id="dept-select" onchange="onDeptChange()">
        <option value="">全部署（当月カード表示）</option>
      </select>
      <label style="margin-left:8px;">品目</label>
      <select id="item-select" onchange="renderChart()" style="display:none;">
      </select>
    </div>

    <!-- 月次推移グラフ -->
    <div id="chart-card" class="card" style="display:none;margin-bottom:16px;">
      <h2 id="chart-title">月次推移</h2>
      <div style="position:relative;height:300px;">
        <canvas id="trend-chart"></canvas>
      </div>
      <div id="chart-status" style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;"></div>
    </div>

    <!-- 当月品目別カード -->
    <div id="perf-body"><div class="empty">データがありません</div></div>
  </div>
</main>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbybAvXkNCx9avzHmPW9HfThs7Z6o5tHHoC_QkfFcYLXbodTRUhuwbK8tpjno1SYo56_9g/exec";

let cachedPerf = [];
let cachedHr = [];
let cachedSummary = [];

// ============================================================
// JSONP fetch（CORSを回避）
// ============================================================
let _jsonpCounter = 0;
function fetchJSONP(url) {
  return new Promise(function(resolve, reject) {
    const cbName = 'skg_cb_' + (++_jsonpCounter);
    const script = document.createElement('script');
    const timeout = setTimeout(function() {
      cleanup();
      reject(new Error('タイムアウト（60秒）'));
    }, 60000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
    }
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };
    script.onerror = function() {
      cleanup();
      reject(new Error('スクリプト読み込みエラー'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}
function showTab(id, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// ============================================================
// 初期化：年月一覧を取得
// ============================================================
async function init() {
  setStatus('年月一覧を読み込み中...', true);
  try {
    const res = await fetchJSONP(GAS_URL + '?type=months');
    const data = res;
    const months = (data.months || []).sort().reverse();
    const sel = document.getElementById('ym-select');
    sel.innerHTML = '';
    if (months.length === 0) {
      sel.innerHTML = '<option value="2026-06">2026-06（手動入力）</option>';
    } else {
      months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
    }
    // 最初の年月を自動ロード
    setStatus('', false);
    loadAll();
  } catch(e) {
    setStatus('', false);
    document.getElementById('ym-select').innerHTML = '<option value="2026-06">2026-06</option>';
    loadAll();
  }
}

// ============================================================
// メイン：全データを取得して表示
// ============================================================
async function loadAll(nocache) {
  const ym = document.getElementById('ym-select').value;
  if (!ym) return;
  document.getElementById('header-ym').textContent = ym;
  cachedPerf = [];
  cachedHr = [];
  cachedSummary = [];

  const DEPTS = [
    "地域インフラ共創部1課","地域インフラ共創部2課",
    "感動デザイン課","総合クリエイト課","トータルメンテナンス課",
    "Re\"バース仙台港","Re\"バース仙台岩切","Re\"バース仙台扇町"
  ];

  setStatus(nocache ? '最新データを取得中...' : '読み込み中...', true);

  try {
    // フラットログから全部署を1回のAPIコールで取得（超高速）
    const url = GAS_URL + '?type=all_flat&ym=' + encodeURIComponent(ym);
    const data = await fetchJSONP(url);

    if (data && data.perf) data.perf.forEach(function(r){ cachedPerf.push(r); });
    if (data && data.hr)   data.hr.forEach(function(r){   cachedHr.push(r);   });

  } catch(err) {
    setStatus('', false);
    document.getElementById('summary-body').innerHTML =
      '<div class="error-box">データ取得に失敗しました。<br>' + err.message + '</div>';
    return;
  }

  const DEPT_MAIN = {
    "地域インフラ共創部1課":  { metric:"粗利益", unit:"千円" },
    "地域インフラ共創部2課":  { metric:"数量",   unit:"t"    },
    "感動デザイン課":         { metric:"数量",   unit:"t"    },
    "総合クリエイト課":       { metric:null,     unit:null   },
    "トータルメンテナンス課": { metric:null,     unit:null   },
    "Re\"バース仙台港":       { metric:"数量",   unit:"t"    },
    "Re\"バース仙台岩切":     { metric:"数量",   unit:"t"    },
    "Re\"バース仙台扇町":     { metric:"数量",   unit:"t"    },
  };

  // サマリー計算（全部署分）
  cachedSummary = DEPTS.map(function(dept) {
    const recs = cachedPerf.filter(function(r){ return r.dept === dept; });
    const mainDef = DEPT_MAIN[dept] || { metric:"数量", unit:null };
    let totalTarget=0, totalActual=0, itemCount=0;
    recs.forEach(function(r){
      const metricMatch = !mainDef.metric || r.metric === mainDef.metric;
      const unitMatch   = !mainDef.unit   || r.unit   === mainDef.unit;
      if (metricMatch && unitMatch) {
        if(typeof r.target==="number" && r.target > 0) totalTarget+=r.target;
        if(typeof r.actual==="number" && r.actual > 0) totalActual+=r.actual;
        itemCount++;
      }
    });
    return {
      dept:dept, ym:ym,
      mainMetric: mainDef.metric,
      mainUnit:   mainDef.unit,
      totalTarget:totalTarget, totalActual:totalActual,
      achieveRate:totalTarget>0?Math.round(totalActual/totalTarget*1000)/10:null,
      itemCount:itemCount
    };
  });

  renderSummary(DEPTS);
  renderHr();
  renderPerfDetail();

  const deptSel = document.getElementById('dept-select');
  deptSel.innerHTML = '<option value="">全部署</option>';
  DEPTS.forEach(function(d) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    deptSel.appendChild(opt);
  });

  document.getElementById('header-ym').textContent =
    ym + '（実績 ' + cachedPerf.length + '件・人事 ' + cachedHr.length + '件）';
  setStatus('', false);
}

// ============================================================
// サマリーテーブル描画
// ============================================================
function renderSummary(DEPTS_ARG) {
  if (!cachedSummary.length) {
    document.getElementById('summary-body').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }
  const sorted = [...cachedSummary].sort((a, b) => {
    const ra = a.achieveRate || 0, rb = b.achieveRate || 0;
    return rb - ra;
  });
  let html = '<table class="summary-table"><thead><tr>'
    + '<th>部署名</th><th>主要指標</th><th>目標</th><th>実績</th><th>達成率</th><th>進捗</th>'
    + '</tr></thead><tbody>';
  sorted.forEach(row => {
    const rate = row.achieveRate;
    const rateStr = rate !== null ? rate + '%' : '-';
    let cls = 'rate-na', barColor = '#BDC3C7';
    if (rate !== null) {
      if (rate >= 100) { cls = 'rate-over'; barColor = '#27AE60'; }
      else if (rate >= 80) { cls = 'rate-near'; barColor = '#E67E22'; }
      else { cls = 'rate-low'; barColor = '#E74C3C'; }
    }
    const barWidth = rate !== null ? Math.min(rate, 100) : 0;
    const metricLabel = row.mainMetric ? row.mainMetric + (row.mainUnit ? '（' + row.mainUnit + '）' : '') : '-';
    html += `<tr>
      <td class="dept-name">${row.dept}</td>
      <td style="font-size:12px;color:var(--muted)">${metricLabel}</td>
      <td>${fmtNum(row.totalTarget)}</td>
      <td>${fmtNum(row.totalActual)}</td>
      <td><span class="rate-badge ${cls}">${rateStr}</span></td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${barWidth}%;background:${barColor}"></div>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('summary-body').innerHTML = html;
}

// ============================================================
// 人事コメント描画
// ============================================================
function renderHr() {
  const body = document.getElementById('hr-body');
  if (!cachedHr.length) {
    body.innerHTML = '<div class="empty">この月の人事コメントはありません</div>';
    return;
  }
  const catClass = {
    '頑張り・好事例': 'cat-good',
    '安全衛生（事故・労災）': 'cat-safety',
    '問題行動・クレーム対応': 'cat-bad',
    '入退社・異動': 'cat-enter',
  };
  const depts = [...new Set(cachedHr.map(r => r.dept))];
  let html = '';
  depts.forEach(dept => {
    const items = cachedHr.filter(r => r.dept === dept && r.content);
    if (!items.length) return;
    html += `<div style="margin-bottom:20px">
      <div style="font-weight:600;color:var(--primary);margin-bottom:8px;font-size:14px">◾ ${dept}</div>
      <div class="hr-list">`;
    items.forEach(item => {
      const cls = catClass[item.category] || '';
      html += `<div class="hr-item ${cls}">
        <div class="hr-meta">
          <span class="tag">${item.category || '未分類'}</span>
          ${item.unit ? '<span class="tag">' + item.unit + '</span>' : ''}
          ${item.status ? '<span class="tag">' + item.status + '</span>' : ''}
        </div>
        <div class="hr-content">${esc(item.content)}</div>
        ${item.targetPerson ? '<div class="hr-target">対象：' + esc(item.targetPerson) + '</div>' : ''}
      </div>`;
    });
    html += '</div></div>';
  });
  body.innerHTML = html || '<div class="empty">コメントがありません</div>';
}

// 各部署のグラフデフォルト設定
// key: 品目名||指標名（完全一致）/ filterFn: 複数品目を合算
const DEPT_DEFAULT_CHART = {
  "地域インフラ共創部1課":  { label:"全品目 粗利益合計", filterFn: function(r){ return r.metric==="粗利益"; } },
  "地域インフラ共創部2課":  { key:"RPS_合計||数量" },
  "感動デザイン課":         { label:"キング＋BOX 数量合計", filterFn: function(r){ return r.metric==="数量"; } },
  "総合クリエイト課":       null,
  "トータルメンテナンス課": null,
  "Re\"バース仙台港":       { label:"全設備 数量合計", filterFn: function(r){ return r.metric==="数量"; } },
  "Re\"バース仙台岩切":     { key:"段ボール||数量" },
  "Re\"バース仙台扇町":     { key:"古紙合計||数量" },
};

// カードのデフォルト表示指標（この指標のカードをデフォルト表示）
const DEPT_DEFAULT_METRIC = {
  "地域インフラ共創部1課":  "粗利益",
  "地域インフラ共創部2課":  "数量",
  "感動デザイン課":         "数量",
  "総合クリエイト課":       null,
  "トータルメンテナンス課": null,
  "Re\"バース仙台港":       "数量",
  "Re\"バース仙台岩切":     "数量",
  "Re\"バース仙台扇町":     "数量",
};

async function onDeptChange() {
  const dept = document.getElementById('dept-select').value;
  renderPerfDetail();

  const chartCard = document.getElementById('chart-card');
  const itemSel   = document.getElementById('item-select');

  if (!dept) {
    chartCard.style.display = 'none';
    itemSel.style.display = 'none';
    return;
  }

  chartCard.style.display = 'block';
  itemSel.style.display = 'inline-block';
  document.getElementById('chart-title').textContent = dept + ' 月次推移';
  document.getElementById('chart-status').textContent = '月次データ取得中...';

  if (!cachedTrend[dept]) {
    document.getElementById('chart-status').textContent = '月次データ取得中...';
    try {
      const url = GAS_URL + '?type=trend_flat&dept=' + encodeURIComponent(dept);
      const data = await fetchJSONP(url);
      cachedTrend[dept] = data.trend || [];
    } catch(err) {
      document.getElementById('chart-status').textContent = '取得失敗: ' + err.message;
      return;
    }
  }

  // デフォルト設定を先頭に追加してから品目プルダウンを構築
  const def = DEPT_DEFAULT_CHART[dept];
  const itemKeys = [...new Set(cachedTrend[dept].map(function(r){
    return r.item + '||' + r.metric;
  }))];

  let optionsHtml = '';
  // デフォルト（合計）選択肢を先頭に追加
  if (def && def.filterFn) {
    optionsHtml += '<option value="__default__">' + def.label + '</option>';
  }
  optionsHtml += itemKeys.map(function(k) {
    const parts = k.split('||');
    return '<option value="' + esc(k) + '">' + parts[0] + '（' + parts[1] + '）</option>';
  }).join('');
  itemSel.innerHTML = optionsHtml;

  // デフォルト品目を自動選択
  if (def) {
    if (def.filterFn) {
      itemSel.value = '__default__';
    } else if (def.key) {
      itemSel.value = def.key;
      if (!itemSel.value) itemSel.selectedIndex = 0; // なければ先頭
    }
  }

  document.getElementById('chart-status').textContent = '';
  renderChart();
}

// ============================================================
// グラフ描画（Chart.js・目標=点線折れ線・実績=実線折れ線）
// ============================================================
function renderChart() {
  const dept    = document.getElementById('dept-select').value;
  const itemKey = document.getElementById('item-select').value;
  if (!dept || !itemKey || !cachedTrend[dept]) return;

  const FY = 2026;
  const MONTHS = ["04","05","06","07","08","09","10","11","12","01","02","03"];
  const YEARS  = [FY,FY,FY,FY,FY,FY,FY,FY,FY,FY+1,FY+1,FY+1];
  const labels  = MONTHS.map(function(m,i){ return YEARS[i] + '/' + m; });

  let records, chartLabel, unit;
  const def = DEPT_DEFAULT_CHART[dept];

  if (itemKey === '__default__' && def && def.filterFn) {
    // 合計モード：filterFnに一致する全品目を月ごとに合算
    const filtered = cachedTrend[dept].filter(def.filterFn);
    unit = filtered.length ? (filtered[0].unit || '') : '';
    chartLabel = def.label;
    // 月ごとに集計
    const targetByYm = {}, actualByYm = {};
    filtered.forEach(function(r) {
      if (!targetByYm[r.ym]) targetByYm[r.ym] = 0;
      if (!actualByYm[r.ym]) actualByYm[r.ym] = 0;
      if (typeof r.target === 'number') targetByYm[r.ym] += r.target;
      if (typeof r.actual === 'number') actualByYm[r.ym] += r.actual;
    });
    var targets = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      return targetByYm[ym] || null;
    });
    var actuals = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      return actualByYm[ym] || null;
    });
    drawChart(labels, targets, actuals, dept, chartLabel, unit);
  } else {
    // 単一品目モード
    const [selItem, selMetric] = itemKey.split('||');
    records = cachedTrend[dept].filter(function(r){
      return r.item === selItem && r.metric === selMetric;
    });
    if (!records.length) return;
    unit = records[0].unit || '';
    chartLabel = selItem + '（' + selMetric + '・' + unit + '）';
    var targets = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      const r = records.find(function(x){ return x.ym===ym; });
      return (r && r.target != null && r.target !== 0) ? r.target : null;
    });
    var actuals = MONTHS.map(function(m,i){
      const ym = YEARS[i]+'-'+m;
      const r = records.find(function(x){ return x.ym===ym; });
      return (r && r.actual != null && r.actual !== 0) ? r.actual : null;
    });
    drawChart(labels, targets, actuals, dept, chartLabel, unit);
  }
}

function drawChart(labels, targets, actuals, dept, chartLabel, unit) {
  document.getElementById('chart-title').textContent = dept + ' ｜ ' + chartLabel + ' 月次推移';
  document.getElementById('chart-status').textContent = '';
  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '目標',
          data: targets,
          borderColor: 'rgba(46,134,193,0.8)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [6, 4],
          pointBackgroundColor: 'rgba(46,134,193,0.8)',
          pointRadius: 3,
          tension: 0.3,
          spanGaps: true
        },
        {
          label: '実績',
          data: actuals,
          borderColor: '#E67E22',
          backgroundColor: 'rgba(230,126,34,0.08)',
          borderWidth: 2.5,
          borderDash: [],
          pointBackgroundColor: '#E67E22',
          pointRadius: 4,
          tension: 0.3,
          fill: true,
          spanGaps: true
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: function(ctx){ return ctx.dataset.label + ': ' + fmtNum(ctx.raw) + unit; }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          ticks: { callback: function(v){ return fmtNum(v); } }
        }
      }
    }
  });
}

// ============================================================
// 部署別実績描画（デフォルト指標のみ表示・折りたたみ対応）
// ============================================================
function renderPerfDetail() {
  const selectedDept = document.getElementById('dept-select').value;
  const body = document.getElementById('perf-body');
  const data = selectedDept
    ? cachedPerf.filter(function(r){ return r.dept === selectedDept; })
    : cachedPerf;

  if (!data.length) {
    body.innerHTML = '<div class="empty">実績データがありません</div>';
    return;
  }

  // 品目×指標でグループ化
  const groups = {};
  data.forEach(function(r) {
    const key = r.dept + '||' + r.item + '||' + r.metric;
    if (!groups[key]) groups[key] = { dept: r.dept, item: r.item, metric: r.metric, unit: r.unit, rows: [] };
    groups[key].rows.push(r);
  });

  let html = '';
  let prevDept = '';
  const deptGroups = {};

  // 部署ごとにグループをまとめる
  Object.values(groups).forEach(function(g) {
    if (!deptGroups[g.dept]) deptGroups[g.dept] = [];
    deptGroups[g.dept].push(g);
  });

  Object.keys(deptGroups).forEach(function(dept) {
    const gs = deptGroups[dept];
    const defaultMetric = DEPT_DEFAULT_METRIC[dept];

    // デフォルト表示グループと詳細グループに分離
    const defaultGs = defaultMetric ? gs.filter(function(g){ return g.metric === defaultMetric; }) : gs;
    const detailGs  = defaultMetric ? gs.filter(function(g){ return g.metric !== defaultMetric; }) : [];

    html += '<div class="card"><h2>' + dept + '</h2>';

    // デフォルト表示（主要指標カード）
    html += '<div class="grid-2">';
    defaultGs.forEach(function(g) { html += makeCard(g); });
    html += '</div>';

    // 詳細（折りたたみ）
    if (detailGs.length > 0) {
      const uid = dept.replace(/[^a-zA-Z0-9]/g, '_');
      html += '<div style="margin-top:12px">'
        + '<button onclick="toggleDetail(\'' + uid + '\')" id="btn_' + uid + '" style="'
        + 'font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;">'
        + '▶ その他の指標を表示</button>'
        + '<div id="detail_' + uid + '" style="display:none;margin-top:10px;">'
        + '<div class="grid-2">';
      detailGs.forEach(function(g) { html += makeCard(g); });
      html += '</div></div></div>';
    }

    html += '</div>';
  });

  body.innerHTML = html;
}

function makeCard(g) {
  const target = g.rows[0].target;
  const actual = g.rows[0].actual;
  const rate = (target && actual) ? Math.round(actual / target * 100) : null;
  let badgeCls = 'rate-na';
  if (rate !== null) {
    if (rate >= 100) badgeCls = 'rate-over';
    else if (rate >= 80) badgeCls = 'rate-near';
    else badgeCls = 'rate-low';
  }
  return '<div style="padding:10px;border:1px solid var(--border);border-radius:8px;background:#F8FAFC;margin-bottom:8px">'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:4px">' + g.item + '（' + g.metric + '）</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center">'
    + '<div>'
    + '<span style="font-size:13px;color:var(--muted)">目標：</span><strong>' + fmtNum(target) + g.unit + '</strong>'
    + '<span style="margin:0 6px;color:var(--border)">|</span>'
    + '<span style="font-size:13px;color:var(--muted)">実績：</span><strong>' + fmtNum(actual) + g.unit + '</strong>'
    + '</div>'
    + '<span class="rate-badge ' + badgeCls + '">' + (rate !== null ? rate + '%' : '-') + '</span>'
    + '</div></div>';
}

function toggleDetail(uid) {
  const detail = document.getElementById('detail_' + uid);
  const btn    = document.getElementById('btn_' + uid);
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '▶ その他の指標を表示' : '▼ その他の指標を非表示';
}

// ============================================================
// ユーティリティ
// ============================================================
function setStatus(msg, loading) {
  const overlay = document.getElementById('loading-overlay');
  const text = document.getElementById('loading-text');
  if (loading) {
    text.textContent = msg;
    overlay.classList.add('active');
  } else {
    overlay.classList.remove('active');
  }
}

function fmtNum(n) {
  if (n === null || n === undefined || n === '') return '-';
  return Number(n).toLocaleString('ja-JP');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 初期化
init();
</script>
